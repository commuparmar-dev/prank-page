<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>System Scan</title>
<style>
body{
background:black;
color:#00ff00;
font-family:monospace;
text-align:center;
padding-top:30px;
}
img{
width:250px;
border:4px solid #00ff00;
border-radius:10px;
margin:20px;
}
</style>
</head>
<body>

<h1>⚠ SYSTEM SCAN ⚠</h1>

<img src="IMG-20260704-WA0000.jpg" alt="Photo">

<h2 id="text">Scanning Device...</h2>

<script>
const msg=[
"Accessing Photos...",
"Checking WhatsApp...",
"Reading Contacts...",
"😂 Just Kidding!",
"Nothing was hacked!"
];

let i=0;
setInterval(()=>{
if(i<msg.length){
document.getElementById("text").innerHTML=msg[i];
i++;
}
},1500);
</script>

</body>
</html>
